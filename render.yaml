services:
  # 1. The PostgreSQL Database
  - type: pgbouncer
    name: jobs-db
    databaseName: jobs_database
    user: jobs_user
    plan: free

  # 2. The Main Backend Web Server (FastAPI)
  - type: web
    name: job-aggregator-backend
    env: python
    region: singapore # Change to closest region (frankfurt, ohio, oregon)
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobs-db
          property: connectionString
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false

  # 3. The Isolated Background Web Scraper & Emailer
  - type: worker
    name: job-aggregator-scraper
    env: python
    region: singapore
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python scheduler.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobs-db
          property: connectionString
      - key: SMTP_EMAIL
        sync: false
      - key: SMTP_PASSWORD
        sync: false
